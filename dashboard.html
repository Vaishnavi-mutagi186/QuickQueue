<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QuickQueue Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
padding:30px;
}

h1{
font-size:32px;
background:linear-gradient(90deg,#38bdf8,#a78bfa,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#94a3b8;
margin-bottom:25px;
}

/* KPI */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

.metric{
font-size:30px;
font-weight:bold;
color:#38bdf8;
margin-top:10px;
}

/* LAYOUT */
.layout{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:20px;
}

.section{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
}

/* ALERTS */
.alert{
background:rgba(251,191,36,0.1);
border-left:4px solid #fbbf24;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.pulse{
width:10px;
height:10px;
border-radius:50%;
background:#22c55e;
display:inline-block;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.6);opacity:0.5;}
100%{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<h1>🚀 QuickQueue Dashboard</h1>
<p class="subtitle">Real-time Queue Intelligence System</p>

<!-- KPI CARDS -->
<div class="grid">

<div class="card">
<div>Currently Serving <span class="pulse"></span></div>
<div class="metric" id="serving">A27</div>
</div>

<div class="card">
<div>Waiting Users</div>
<div class="metric" id="waiting">0</div>
</div>

<div class="card">
<div>Priority Users</div>
<div class="metric" id="priority">0</div>
</div>

<div class="card">
<div>Served</div>
<div class="metric" id="served">0</div>
</div>

</div>

<!-- CHARTS + INSIGHTS -->
<div class="layout">

<div class="section">
<h3>📊 Queue Load Analysis</h3>
<canvas id="chart1"></canvas>
</div>

<div class="section">
<h3>📈 Priority vs Regular</h3>
<canvas id="chart2"></canvas>
</div>

<div class="section">
<h3>📉 Wait Time Trend</h3>
<canvas id="chart3"></canvas>
</div>

<div class="section">
<h3>🧠 AI Insights</h3>
<div id="insights">
<div class="alert">Waiting for live data...</div>
</div>
</div>

</div>

<script>

/* SOCKET CONNECTION */
const socket = io();

/* LIVE UPDATES */
socket.on("update_dashboard", (data) => {

document.getElementById("waiting").innerText = data.waiting;
document.getElementById("priority").innerText = data.priority;
document.getElementById("served").innerText = data.served;

/* AI INSIGHTS */
document.getElementById("insights").innerHTML = `
<div class="alert">🔥 System Load: ${data.waiting > 15 ? "HIGH" : "NORMAL"}</div>
<div class="alert">⚡ Priority Load: ${data.priority}</div>
<div class="alert">🧠 Action: ${data.waiting > 20 ? "OPEN EXTRA COUNTER" : "OPTIMAL FLOW"}</div>
`;

});

/* CHART 1 */
let chart1 = new Chart(document.getElementById("chart1"), {
type: "bar",
data: {
labels: ["9AM","10AM","11AM","12PM","1PM","2PM"],
datasets: [{
data: [10,20,35,50,30,15],
backgroundColor: "#38bdf8"
}]
}
});

/* CHART 2 */
new Chart(document.getElementById("chart2"), {
type: "doughnut",
data: {
labels: ["Regular","Priority"],
datasets: [{
data: [15,5],
backgroundColor: ["#38bdf8","#fbbf24"]
}]
}
});

/* CHART 3 */
new Chart(document.getElementById("chart3"), {
type: "line",
data: {
labels: ["Mon","Tue","Wed","Thu","Fri"],
datasets: [{
data: [18,14,12,10,13],
borderColor: "#22c55e",
tension: 0.4
}]
}
});

/* LIVE CHART UPDATE */
setInterval(() => {

chart1.data.datasets[0].data = [
Math.random()*20,
Math.random()*40,
Math.random()*30,
Math.random()*60,
Math.random()*25,
Math.random()*35
];

chart1.update();

}, 4000);

</script>

</body>
</html>
